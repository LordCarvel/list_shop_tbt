services:
  - type: web
    name: list-shop-tbt-api
    env: java
    plan: free
    buildCommand: chmod +x ./mvnw && ./mvnw -DskipTests package
    startCommand: java -jar target/listShopTbt-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
